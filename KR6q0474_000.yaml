front:
  text: 重刻朝宗禪師語録緣起松陵有汪仲廉者別號三眼居士篤信向上宗乘遍見知識始參報恩玉林禪師忽遇諾諾從江右來持寶華朝宗禪師録一冊見之水乳相投有問道書寶華亦隨有答及賜法名行敕皆從諾公錫鐶往復惜未獲覿面提持士因誓作祖師門下客終身不娶不治生産清淨齊戒茆茨翛然一似深山枯衲性至孝奉母左右不離俟終老始入山歲戊子冬十月寶華順世士不得親炙為恨時諾公復持全録付汪如饑逢王膳矢志欲梓行南國吾邑有葉慶繩先生者於明季按東粵禮曹溪知信宗門後在白下遇師遂北面事之乞名行承字妙高居士汪得相與謀刻是録斂金未就己亥秋惜乎仲廉齎志長往慶繩相繼不祿有遺鏹屬同志張行曄葉韓奕韓即慶繩之族也未幾韓奕亦下世包仲將偕諸善友持録乞大覺老人刪定因循歲月凡幾前己未春迂過武林戴岵瞻先生齊頭談及寶華岵云我於大覺老人處得假一編在出示之猶是汪居士三十年前案頭故物也迂時走晤諸友舉往事如夢得醒亦隨告韓奕嗣君名蘇皋者欣然出汪遺鏹付諸同事若行曄一乘輩邀迂介紹叩岵翁主裁刪刻已頷之不意今辛酉春仲岵翁忽捐館尋入夏過仁長園亭留宿力促迂攝任其事迂合爪云敬從是役仁長岵翁之長君也與葉蘇皋皆肯繼述先人之事兩君亦箇中人也五月望攜錫過戴氏齊居校定此録付梓取諾諾所編而約之有客云聞汪居士必梓完録以行今以諾編而復約之何也迂云非故約之也特限于資斧耳庸詎知甘露一指蘇遍塵痾師子乳一滴併散驢乳十斛脫使朝和尚昔年面目未現時此録全無一畫脫或此老舌腕猶存師音在響又誰竟其首尾偏圓何多寡之足論哉客復云此翁有榷論玄要別集恐不應逸迂云玄要自玄要透向上關者人自領會古云文殊不知普賢昔楊子雲草太玄時皆不好獨桓談以為絶倫嘆曰後世有楊子雲必好之也豈非抱獨知之契以俟後世云爾又唐韓昌黎文公沒而其集湮敝無有識者二百年而始遇異代知己歐陽修頗好之每對人必曰當讀韓子書三十年而後學者爭趨韓由是稱大家必推韓始而推韓自歐陽子始嗚呼道固有行於遠而止於近有忽於今而貴於後者今寶華拈提玄要之別集將謂是歟非唯世間好惡之使然亦俟時而後出我何敢逸之豈不聞三世諸佛宣說一大藏經教是覆瓿紙耶歷代祖師判斷千七百則爛葛藤公案是間家具耶客曰止止以豫己意而去取恐有不合迂笑曰某本不會佛法的人是胡可妄臆去取乎舉一喻以明之昔白傅每創一稿對家媼吟詠之媼豎點頭始入集橫點頭姑置之夫白公之才情冠古今何以所著詩文不質之于當代名公巨卿顧獨點頭去取聽之目不識丁之灶下媼耶真堪絶倒人世噫吾人一種真性靈往往貫金石格無情而況有知有覺之媼乎故向他耳門吟詠一過去取定之矣豈非以真合真如鏡照鏡迂今不獨作寶華家裏嫫姥且為三眼居士了三十年未了之公案孰曰無補客唯唯而退試看過去諸公於寂定中咸踴躍稱慶迂子炷香頂祝願諸公乘般若正因再來法苑金湯俾捐資助刻者暨現在留心同事攝者福齡咸厚共證菩提時皇清康熙二十年龍集辛酉暢月日松陵迂公寤莊識于錢塘戴氏娑羅園中重刻朝宗禪師語録目次一卷緣起上堂二卷上堂三卷上堂四卷小參五卷小參晚參升座六卷普說七卷機緣八卷請益九卷法語頌古雜偈佛事十卷書問塔銘
