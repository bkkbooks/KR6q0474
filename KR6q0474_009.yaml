body:
  text: 侍者行導編法語示暘谷禪人斷生死底利刃開祖關底鑰匙直下全體全用徹始徹終以至接物利生神通遊戲無不繇當人一箇緊切而已所以道參禪無祕訣只要生死切暘谷上人志慕斯道屢求指示箇緊切話頭余云緊切處便是話頭上人似未領解復求法語余不得已只得落二落三重重注解向虛空裏釘橛去也須知緊切話頭便是當人父母未生時本來面目更無別法若離自己面目別有緊切處即為邪法矣如今秖為靈根未熟擔荷不下但向二六時中緊切處更加緊切日久月深自然推門落臼方知未求指示已前兩手分付了也雖然直饒到者田地更有事在須買草鞋行腳遍歷諸方忽遇大手眼宗匠為汝拈卻炙脂帽子脫卻鶻臭布衫才為了手至囑示子介項居士見一切法不見自己便是生死惟見自己不見一切法便是涅槃生死涅槃一齊坐斷則頭頭法法初不隱藏轉步移身古今不昧便是世出世間大丈夫漢也何如示泐菴陳居士諱登明如何是祖師西來意庭前柏樹子未舉此話時不用存一毫佛法見正舉此話時不用存一毫湊泊心舉此話畢不用落一毫注腳直下光前絶後只將此話舉來舉去疑來疑去心識盡計較忘驀然打失㘞早知燈是火飯熟幾多時正好喫山僧三十棒在何以故我王庫內無如是刀從上來一言一句如擊石火似閃電光無你近傍處雖然若作擊石火閃電光會則業識茫茫千里萬里須是腳踏實地目視雲霄獅子咬人不隨藥忌則腳跟下事用之則為爪牙劍刃上事體之即為本分然後將本分爪牙一齊傾在大洋海底方知嫌佛不作嫌法不求非大我慢乃理合如然示無際禪人根身器界之畔岸謂之際根不住根身不住身器不住器界不住界烏有畔岸之可得哉如是則覿體全真圓融無際如大火聚觸著便燒如走盤珠不撥自轉豈非打開寶藏運出家珍邪咄是甚麼乾屎橛示恆潔禪人若論此事須是生鐵鑄就底漢嫌佛不作嫌法不求方有少分氣息你才擬心錯過了也何況思惟卜度分別解注大小偏圓三玄五位機境照用權實理事入海算沙所能幾及哉與麼參學所謂怖頭狂走除非夙有靈骨退步知非歇卻馳求心打翻玄妙窟於千聖挨劄不入處別通一路方好靈祐門下來喫棒不然非吾種草敢問既得別通一路更要喫棒作麼棒頭有眼明如日要識真金火裏看示潛子龔居士究竟箇事須將從前所知所見底所學所會底盡情做箇檀波羅蜜便覺胸次中空勞勞地虛豁豁地十二時中不與一物作對方少有趨向分僧問雲門如何是佛門云乾屎橛驀然向言下絶卻心性光影全身擔荷於毫芒未動之先豈復羅籠可住呼喚可回者邪示而嘉李居士古云作善則善現作惡則惡現真心則隱沒居士云二六時中舉心動念不敢妄為此亦人天福報然總不出善惡兩途隱沒真心多矣須知自心不屬善不屬惡不屬名言無可指擬但向未舉心動念時猛下一刀截斷善惡兩途跳出無明窠窟便是見性成佛底時節示亙慧禪人五宗門庭更無別事只是發明當人本地風光耳苟發明矣不待融會一一自知下落處也不是一箇儱侗和同底道理便當得者佛説一切法為除一切心我無一切心焉用一切法五宗門庭差別正除人差別心者如差別心量未盡豈可便云焉用正好於差別中參到無差別底田地便是本地風光現前底時節示忘證丁居士若欲超生脫死須向無生死地上著力得箇證悟始得既悟矣則生死之心既破無生死之地亦空能證之人既泯所證之理亦忘則在生而生在死而死總是自家屋裏事茲因忘證道人乞法語故書此以示且如何是忘證底事撞著道伴交肩過一生參學事畢示妙高居士即葉廷尉諱紹順此事人人本具箇箇圓成悟與不悟了無差別未得入處時一箇箇頂天立地既得入處時一人人鼻直眉橫所以悟時正悟此不待悟底而無悟迹之可尋香巖云一擊忘所知仰山云悟則不無爭奈落在第二頭何天皇云但盡凡情別無聖解正全提無剩之旨妙高居士既有入處悟迹難除二六時中要求箇不間斷未免反成間斷須知間斷與不間斷皆力量未充自生障礙如今要得透頂透底但撒開兩手放教活卓卓地不使有不間斷之相現前自然不見有間斷之相便是臨別囑付示無上禪人當陽一著萬法具該本始齊彰古今不昧類之世間世間無能類者類之出世間出世間亦無能類者所以為無上最尊之道人人本有箇箇不無諸佛出世出為此耳祖師西來來為此耳教外別傳不立文字覿面提持當頭點破秖貴撒開兩手不著纖毫領箇現成受用謂之直指人心見性成佛奈何衆生夙習深重背覺合塵明明祖父田園棄長他家荒草不能脫體擔當偏要東兜西搭先聖垂慈不得已拈箇塞斷咽喉底鐵餕餡令學者咬嚼咬來咬去嚼來嚼去忽向咬嚼不及處卸卻從前業識透過從上關捩此亦直指中之方便方便中之直指也無上禪人來參山僧每每向上直接禪人不能領荷乃復乞開示參箇話頭山僧隨順顛倒舉箇竹篦子話喚作竹篦則觸不喚作竹篦則背畢竟喚作甚麼汝但向者裏直下截斷去直下休歇去直下死盡偷心去直下壁立千仞去直下口挂東壁去直下轉身吐氣去直下透脫無依去直下向威音王那邊更那邊撥開向上一竅去直下向順逆場中驗得無絲毫滲漏去直饒與麼去猶未是汝住腳處在欲知無上最尊道楖栗橫擔入亂峰咄示龍珠寺純一禪人本地風光至純至一歷劫迷背以至今日若不立志加工忘食廢寢暮叩朝參則無始塵根夾雜濃厚欲求其不為妄想積習之所奪也難矣如今須立純一之志所謂久久不退是也加純一之工所謂不起第二念是也還須參箇純一話頭所謂喚作竹篦則觸不喚作竹篦則背是也喚與不喚皆是夾雜路頭直下坐斷不起第二念以至久久不退則目前靜悄悄地胸次空豁豁地於事無心於心無事要覓箇純一亦不可得何況不純一之夾雜者哉果能信得及參得透親到與麼地速速來見寶華當為點破不然枯木巖前錯路多關係非小至囑至囑示陽和鍾居士生死人人共有超生脫死亦人人共有秖因不悟所以流浪秖因不迷所以超脫其實超脫底人即是流浪底人迷悟互相反覆而當人曾未移易一絲毫也今居士病體沉重怖畏生死來乞做工夫徹頭處若據貧道別無工夫可做只是信得者怖畏生死底心便是當人本體便是本命元辰不屬父母所生身合而有不屬父母所生身散而無湛寂虛凝迥然獨露一切善惡境像妄現切莫隨之自然不怖不畏而去住自在矣第一須知信得自己過便是徹頭處若捨此而別生異念別求工夫便為善惡所牽引也至囑至囑示純我鄧居士世尊云天上天下惟我獨尊肇公云至人空洞無象而萬物無非我造孟氏云萬物皆備於我矣我者何即當人父母未生時本來面目也楞嚴經中謂之妙明真心所以云汝身汝心外洎山河虛空大地咸是妙明真心中所現物如是則即今四大之身五蘊之心併虛空大地如鏡中之像雖現而非實像非實函現像之鏡實物非實而現物之心實所以法華經云唯此一事實世人不知妙明真心本來無物現而非有乃認物為己將幻心幻身認為我體以致輪回如認鏡中之像為鏡安得不為之迷故佛祖聖賢憫而出世遂與直下喚醒直下指破者此也龐居士云日用事無別唯吾自偶諧頭頭非取捨處處勿張乖朱紫誰為號丘山絶點埃神通并妙用運水及搬柴真箇是純我法門居士果欲超脫生死凌跨賢聖請向者裏直下自透示環水劉居士此事如杲日麗天無絲毫遮障一念未舉以前早已遍照無餘也才擬參禪大似片雲生於太虛況更求法語向山僧筆端下討落處豈非遍空盡界皆黑雲所覆邪直須一陳狂風吹向不知何處去了欲覓覓不來欲起起不得全體顯露把住要津自然羅籠不肯住呼喚不回頭豈不為大丈夫事哉示智傳道人參禪學道只要明得己躬下事既不明不得不疑千疑萬疑只此一疑十二時中應酬世事誦經禮佛總不相礙即不應酬不禮誦亦不礙隨人自便不必於此生疑也秖要話頭疑情無有間斷若話頭上疑情一破則應酬世事誦經禮佛無不是現前三昧矣一念未生前如何是你自己參頌古洞山悟道機緣無情説法本無言眼處聞之便了然驀地眼光還謝處我渠回互始通玄百丈再參收來放去鐵團圞宗旨分明為爾傳末後一椎俱喪盡頂門依舊黑漫漫德山托鉢托回休去已全彰活得三年雪上霜直令後代守株客踢翻尿器沸如湯紫湖捉賊多年做盡賊生涯今日須尋箇當家誰料賊兒不善賊空教老賊自投衙石鞏捉空不知巴鼻徒自撮空直得虛空叫屈方知轉入此中咦誰人解向聲前薦倒張石鞏一張弓青州布衫青州布衫重七斤提出當陽不用稱擬向定盤星上看眼裏無筋一世貧玄沙三種病人患盲患啞患聾箇箇灑灑落落若道接物利生大似無繩自縛藏身處沒蹤迹沒蹤迹處莫藏身三十夜裏月亮堂堂我去看稻賊來偷秧跳板頭上翻身夾頭毛一把揪來端端是箇和尚端獅子女妝示尼尼有省僧中女子滿面慚惶女中丈夫一笑承當從今醜態難回護不必胭脂花粉妝法眼指簾一得復一失九九八十一明眼衲僧家當機須委悉不委悉扁擔折兮兩頭脫若委悉指上波濤千古潑咄南院啐啄同時話啐啄同時失句下分疏墮明白者僧妄自強惺惺不知身入蒼龍窟令行者徹骨徹髓旁敲者如楔出楔當時燈影裏行今日青天白日咄汝會也早埋沒更參三生六十劫百丈野狐不落反成落不昧卻不落落昧一時休轉轉俱不錯三界唯心萬法唯識塘口濱裏沈秀才頭上頂箇木棺材手裏捻片車扉版眼白洋洋叫死來物不遷憶昔西施窈窕容至今千載不相逢誰人識得西施面話到西施意便濃天龍一指忽然奮起丈夫志一指頭禪破祖關近取諸身用不盡何須東海與南山乾矢橛當陽一著蓋天地覿面提來付與君不用尋渠舌頭路得欣欣處且欣欣高峰睡中主二首雖然只是舊時人睹讚收回反隔津今日幸還無隔底塵塵剎剎盡家珍月落霜天夜正寒錦鱗透網潑天瀾枕頭落地何曾悟返覺從前被悟瞞香嚴獨腳以一重兮破一重平田淺草易相通忽然突出千峰頂土曠人稀絶所逢惟有玄沙知此意患盲患啞又兼聾臨濟蒿枝拂不避喪身云為法烏藤痛處癢難禁當堂拈出揚家醜秖要諸人善保任芭蕉拄杖子二首以人治人少減多增劈頭撞著活計現成與即與你有奪即奪你無銅頭鐵額漢豈肯受塗糊唵悉唎悉唎蘇嚧蘇嚧趙州密密意猶有你有大家出手得人一豬還人一狗不是頂門正眼開爭免隨他言路走大隨覆龜皮裹骨骨裹皮當機拶著莫遲遲草鞋覆卻成何用大海難教宿死尸泗州大聖揚州出現無剎不現身揚州何以報君子雖愛財取之卻有道毗盧自古現毫端豈是空言無實造佛果禪師悟道因緣豈是提刑秖認聲勤翁觸著快非輕圓通眼耳離依遍始信雞鳴覿面呈百丈禪師鋤地聞鼓聲因緣二首鼓聲聞得笑而歸一飽從來忘百飢盡道者僧三寸密誰知事的理尤微不是肚飢聞鼓響那得呵呵舉钁歸百丈老人爬著癢有情難訴笑微微寶峰惟照禪師二朝士門古人臨終去住自在何道致之峰云老僧將來自縊死去臨終衆僧求峰遺訓峰作惡語數句而終奪食驅耕從古有臨行尤羡寶峰叟一吼今人希冀消菩薩心兮夜又口香爐頌有耳不聞有足不行光明奪目氣概騰雲穿人鼻孔燎人面門驀然拈出一些子冷灰爆處便翻身偶閲魯論夫子之文章一節因頌之默默可聞言不得聖容一見已全陳及乎説處終無説大抵還他未聽人雜偈答東郊畢銀臺臘八日見訪贈偈附來偈諱懋康寒宵天欲雪四望凍雲同黍谷陽和轉梅花已暗通其一忽忽歲云暮鐘聲隔院聞因思向上事脫屣欲從君其二奇哉此何日今古道皆同當午明星現銀臺光已通向上並無事頭頭絶見聞那來心外法拈出盡從君示語可禪人歸蜀二首禪和大事未曾徹奔南走北幾時休不如今日回西蜀故人故里莫他求頭頭法法用全該殺活臨機絶所陪肯將實法相傳授辜負當年臭落腮示聽教者自家兩眼明如日鑿壁偷光紙上詢驀地返觀何太近大千經卷一微塵示智定行者出家志願要爭先莫待明年與後年曠劫塵根一刀斷一毛一髮利人天示寅初劉居士諱旦寅初來問做工夫只者工夫會也無若更遲疑遍參去諸方禪道滿山湖示善超禪人三賢十聖未明宗直指繇來那涉功㘞地一聲善超入時清何處不從容法朗禪人乞攝心偈萬法朗然何思何慮擬欲攝心無本可據我今為汝書此言只此便是攝心處示心恆王居士二首昔年曾罵君三日今日重逢劈脊椎佛法那來恁麼糙從茲切莫更相隨四大本空五陰非有赤心片片為君剖縱使傾湫倒嶽來也知蝦跳不出斗咦猴愁摟搜頭狗走抖擻口示傅居士參竹篦子觸背俱非分明直指間不容髮擬思即死轉身吐氣更郎當佛法何曾是如此畢竟如何問取傅居士示養吾章居士二首參禪切莫住途程二六時中驀直行一日腳跟親點地原來步步契無生觸背俱非直舉揚拈來毫不費商量機前有路如山嶽突出千峰孰敢當示小心吳居士號法名行弘大心季弟大心名行毅兄毅弟弘兄大弟小賓主歷然無餘無少灼然平等法門莫逐世間順倒山居三首一把鋤頭一把鐮山中活計弗須添豈言報答深恩處定在人間椎拂拈諸衲休將淡泊嫌山中柴米有鋤鐮最堪遍地蕨根老水碓春來好換鹽夜來一覺到天光爬起身來日已橫薄薄兩餐瓔珞粥閉門正好上眠床登新安黃山文殊院文殊座踞玉屏峰俯視諸山天際窮長嘯一聲遐邇震那知身只在山中黃山煉丹臺觀鋪海白浪堆中零碎洲半疑海島半山丘一回佇望雲端下笑殺當年藥汞流示亦幻關主掉臂過關去全身把要關如何是關鼻直眉彎只如恁麼道是過關是把關簡點得清楚非干石耳山傅蔭乞偈自化月米溥蔭化米供溥蔭一身一口自相稱特來要我做檀那四句伽陀無少剩天台通玄寺化納國稅寺田難免朝廷課僧役多應檀越當莫得又教收割後出山持疏化齋糧示憨憨陳居士東拋西擲誰為指南百不可取一無所堪飢餐渴飲終日憨憨等間撥著無多子前三三與後三三示咄咄王居士咄咄古今天地是何物雙眼圓明爍太虛一切聖賢如電拂咄咄一大藏教注不及釋迦彌勒是他奴觸不得兮背不得咄咄截斷上流莫輕忽直須參透咄咄禪不枉號之曰咄咄示貿布者見聞覺知只可一度覿面全提當陽無路咄三斤麻一匹布示貞甫薑居士相逢鐵面痛加錐余亦勿慳兩道眉一點遲疑千萬里君當自薦更憑誰示仲曜別居士本無一著原無別調杲日當空處處晃曜拶著當頭便一錐只為與通向上竅若箇獅兒肯後隨倒翻筋斗風前掉示山中門頭兩扇柴扉竟日關白雲深處鎖連環版聲三下通消息賓主門開見笑顏示吳居士四書頌二首卷未手執一部已旋字未目睹萬言已詮參乎一唯有甚相傳堪笑曾公蛇畫足錯教後代口流涎自反而縮君子慎獨兩端竭處是何面目仰鑽萬好參求勿用揠苗仁在熟充實光輝化入神天地兮萬物育師示一僧參話頭有僧朗白曾參天童者聞之謂師云天童乃棒喝門庭何得教人參話頭師大笑白茫然師乃贈以偈云參禪為生死非是要奇特君乃大丈夫勿須學軌則果然到家人千聖渾莫測有時截上流銀山與鐵壁有時放一線舌尖血滴滴轉變在臨機豈云有格式執見未消融腳跟浮逼逼將謂門庭是棒喝只恐驢年猶未徹我爾同門箇弟兄不辭截舌向君説示公路黃孝廉參禪只要解心絶解心絶時生死徹聖凡夢醒悉蠲除獨步大方無軌轍示大心吳居士參禪參透本來人莫向身中認識神一念不生三際斷一毛端現法王身偶詠三首不慕王侯不學仙一瓢一衲度餘年世間多少茫茫者道我曾參佛祖禪全機獨露誰能領一著相應唯自知坐斷碧峰千萬疊從教白醭嘴邊泥禪機獅踞地文勢鶴盤空愧我兩無涉橫身俯仰中題錫山鄒孝廉離煙集二首有引諱兌金子介鄒居士自兩天目來道經新安邂逅相遇即欲邀余同遊黃海余不能從居士乃出離煙集索偈為引屢辭不得勉説偈云黃海即黃山也踏盡中峰上妙峰斷崖有路足難通莫言三祖多奇特歸語知音黃海東不從天目看將來那得奇巒別眼開果到軒轅親歷他數千年事不須猜因僧問話劈面掌之偶成四偈劈面一掌提正令按劍當軒誰敢近獨許諸根穎脫人豁開頂眼無餘分劈面一掌提正令鉢盂不用重安柄巍巍坐斷主人翁生佛古今齊聽命劈面一掌令全提兩腳雙雙入汙泥假饒更有通天路丹鳳何堪誇錦雞劈面一掌令全提白浪滔天佛祖迷撩起便行猶鈍置阿誰能布斷崖梯示于蕃張居士能見能聞認賊為子不見不聞全身墮死只如戒脊乎其所不睹恐懼乎其所不聞意作麼生咄吾無隱乎爾示三玄禪人描也描不成畫也畫不就徹底掀翻已成逗漏那堪數量號三玄大似惡言當面咒七百餘年傳至今等間拈出誰能搆除是吾家出格兒人天祖佛無窠臼吾今書此意無他名實稱時須自透示諾諾導侍者賣瓢杖今年貧勝去年貧瓢杖如何不去身但得無錢能買者不消分付屬他人琉球國蔡堅大夫參索布袋南泉趙州像師手指上下大夫不領書偈二首以示布袋南泉與趙州指天指地為君酬分明三祖一時現何用茫茫更別求覿體示君君不燭猶覓丹青描數軸縱然描得十分成錯過自家真面目為琉球中山王二首蔡大夫請人王尊與法王尊在在何曾昧己真昔日趙州年老邁盡將家計一時陳從來箇事無差別貴賤咸須據本因珍重琉球賢國主莫忘自利利諸人為琉球金武王子生在王家天然尊貴玉葉金枝文經武緯巍巍堂堂了無忌諱面目本如請勿自昧示琉球蔡大夫法名行圓號即中圓覺自性空假即中如珠在盤八面玲瓏千差萬別一脈靈通勿從他覓盡在爾躬示琉球毛大夫法名行覺號本得自覺覺他別無奇特一念回光便同本得公其覺之直下勿惑本自不迷得亦無得示琉球阮大夫法名行香號普薰盡大地人同一鼻根行香一片法界普薰誰言證得圓通門直下毫無氣息存遊石竺山主僧求開示師便打復求偈師示云問道須知學道因棒頭點處絶疏親頂門一日如開眼大地繇來沒兩人示甫宇洪居士獨立無依法界身東西南北自來賓無端瞥起成雙橛辜負毗耶多口人示爾奮黃居士一段天真透頂門絶凡絶聖獨為尊塵塵剎剎皆宣演觸目須知道已存示中立禪人即心即佛雪上霜非佛非心負檀德分付春風仔細吹柳絲蕩漾如機織衆禪者以人人有座空王殿偈呈次韻人人有座空王殿四面無門我獨居出入不教蹤迹現那知潘閬倒騎驢師赴曹溪請松陵安期周居士贈偈次韻和之諱永年附來偈曹溪一滴是禪源祖位千年只獨尊南嶽青原分派去信衣磨衲至今存錫飛庚嶺孤雲聳帆挂彭湖快馬奔未識百川歸海意西江口水待誰吞壇經已絶獲麟編誰續春秋作大全親到一番今日事五家宗派未分前印老風幡事最先莊渠碎鉢亦吳賢人看師作頭陀樣尚早南能剃髮年時師年三十八漫道曹溪便是源朝宗乃見地為尊大千本自毫端出萬派今歸一滴存法席喜逢龍象集鈍機驚見電雷奔千年祖室惟重整一任狐涎吐又吞此道何須圯上編諸方自背有偏全山僧惟據本來令盧祖陳孫孰後前袈裟一展立基先誰不於今仰昔賢須信儼然猶一會不消更問是何年偶閲張子韶頌無隱話云日月光明滿六虛奈緣蒙瞽以為無試教借問傍人看可是吾曾隱爾乎乃置卷云若恁麼則縱然會得無隱依舊日月是日月看者是看者法喻不齊打作兩橛未許聞晦堂木樨香在乃正之云一段光明滿六虛奈緣自蔽以為無請君直下雙眸豁可是吾曾隱爾乎復述兩偈無隱渾如帝網珠光光相攝照無殊吾行與子是丘也子行與丘是子歟人人覿體現前事爾亦何能隱爾乎不見當年黃魯直木樨香處便相符示實功鄭居士曾割肝救母割肝救母未稱孝忤逆聞雷方報恩世出世間奇特事當陽一句獨為尊示葆光居士本來無處所擬住即成塵直下玄關透頭頭露本真示一生禪人不著纖毫了無破綻直下承當一生事辦示太虛禪人箇事絶倫擬廓然等太虛全身離觸背日用自如如示梵愚禪人唐之智梵之愚那箇男兒不丈夫憶昔罔明曾出定至今天下亂塗糊示蘇門黃孝廉選佛號諱繼登法名悟第選官登第出身處選佛繇來悟亦然觸背兩關親透得人間天上獨為先復秋濤陳宗伯韻諱子壯師至五羊寓訶林禪堂暫到訶林椽下居隨宜説法盡成虛當陽一著憑誰舉為報檀那我自如示秀寰章居士如入寶山空手回家家門前火把子直下不教毫髮存當陽獨露西來旨一僧屢求法語師書云沒有甚麼法與你教我如何寫得來無奈常常來逼勒便將此意為君開改衆禪侶踏碓偈示漁甫劉居士碓嘴花開不待春一回踏處一回新曾聞米熟篩猶欠幾箇掀翻窠臼人示完一上人完得一萬事畢上下四維無等匹三乘五性箇中藏盡是虛名惟此實畢竟如何臘月初九日示愚生禪人生死場中站立腳是聖是凡俱不著一任橫揮與豎揮莫教蛙步曾移卻示雲石禪人頂門有眼照天地腳下無塵絶古今一念未生前薦得佛魔何處更追尋示惺聞耆舊一聲觸著便惺惺箇裏誰知有渭涇聞寂聲消開隻眼卻於聞處現儀刑別俯無耆舊世間事事有大體幾見如公得善裁孤掌難鳴年杖國三千里外負吾來退曹溪卻百房留未解脊梁剛過鐵那堪筋骨軟如泥從來去住如弦直魔力雖強徒自迷示信我王居士病中懺悔病從業生業從心生心原無心業從何起業既無起病從何來如斯會得懺法已窮通身慶快只你本容有居士參拜次師合掌偶相又士問了此老僧云昨拜和尚兩手相又是何意此云乃觀門也立成禪人云乃無心耳説甚麼觀門成舉似師乃示二偈了此老僧稱作觀立成禪侶號無心而今十指重又起獨破兩重荊棘林須信無心真觀門何緣彼此苦爭論試看兩手交又處開闔何曾有半痕示憨拙禪人歸韶陽為僧心了總輸僧今古高流履若冰珍重此行須猛覺莫教失念負南能玉石塔二首塔中供丙堂智藏禪師真身浮圖曾費崑岡石輝映雙江豈等間八百年來無一縫層層露出白頭顏層層回回白團團藏祖全身徹骨寒坐斷十方無取捨誰分玉石強名安白蓮池香山垢眼見瓊英社結東林萬億程惟有寶華無染汙瑤池捧出月三更讚世尊出山相小心居士請不起於座現諸威儀降尊就卑奔奔馳馳咦莫道衆生曾度得算來空纍腳跟皮初祖達磨聞昔九年坐今朝胡亦然只因無起相千古錯流傳達磨折蘆渡江覿面不識何須面壁梁庭少室不住兩頭萬浪千波那堪中立他年隻履西歸獨有江上一枝十分春色何故聻原是震旦國裏物布袋和尚已下七讚琉球國蔡大夫請杖頭挂木屐草鞋平地立袋口撮不開遇物便求乞滿臉笑相迎行藏無定迹知你是凡是聖是魔是佛十字街頭等箇人自己不知先著賊南泉祖師斬貓像二首正令全提殺活在手一刀兩斷阿誰知有人人都道未舉以前斬卻以後不知當面成過咎太平時節莫顢頇一一面南看北斗威儀不缺戒律不持手執利刃身搭伽黎是粗是細有眼皆知聞説剛刀不斬無罪何須賣弄死貓頭兒趙州祖師危坐竟日禪道不談將謂出人頭地誰知老邁不堪若不是手裏有些把柄如何掩得者滿面羞慚借問庭前柏樹子何似前三與後三臨濟祖師適有訪不晤三年不鳴一鳴驚人自遭三頓毒到處害叢林黃河水自源頭濁惹得後代兒孫如獅子遊行直入狐狼野干之窟不動聲色而已大驚小怪藏竄無門咦夫是之謂道出常情天童老和尚桐棺山頂曾開眼太白峰前瞎了休最有一般奇特處從來棒棒打人頭又以默禪人請七十七年住世二十六載開堂到底只是一棒惟教直下承當道德高追往古兒孫多遍諸方是處被人圖畫通身好醜難藏不肖今為題讚從來證父攘羊自讚諾諾導侍者請者漢出頭太早惹得許多煩惱慣要呵罵諸方慣要東尋西討問禪禪既不知問道又無可道更要未舉以前一味胡揮亂造恁般性急為人如何活得到老又琉球國蔡大夫請歸國供養行棒不動手説法不開口謾云臨濟孫豈落瞿曇後未移蛙步入閩山不起於座藏北斗問渠端的是何人報道琉球國裏有又旋聞禪人請吾不自毀豈可自讚無讚無毀是名真讚佛事祗陀林挂鐘版緇流號令人天眼目歷歷分明騎聲蓋色所以道尋常不欲向聲前色後鼓弄人家男女舉起版云喚作色得麼擊版一下復擊鐘云喚作聲得麼既然聲色非聲色懸起堂中作軌則十二時中信奉行觸不得兮背不得遂挂福唐彌陀寺諷華嚴經挂鐘版圓頓教舍那身眼聞耳見太分明一十六函齊演出敲鐘無響版無聲既無聲演出底事作麼生高高懸起無藏覆覿面提來用得親上六祖真身供葉落歸根來時無口即今葉已落也根已歸也來已來也直須覿面證明豈敢囊藏被蓋遂獻供云是名精進是名真法供養祖師掃憨山大師塔齒髮塔也身在五乳時有僧假稱老宿付法又有僧假師號先至才波闊大願力弘深闡教義而誨人不倦濬曹源而拌命擔承果得海內緇流説禪浩浩更見濟宗一派遍地紛紛雖然有正有邪有真有偽畢竟邪不勝正偽不掩真今朝孫復於祖所謂有志竟成吾宗久塞師願乃興全身雖去齒髮猶存一炷心香茶一盞願與大師生生世世不惜身命共振祖庭上天童老和尚恩供拈香云若道受者老和尚恩於不肖亦不增若道受者老和尚屈於不肖亦不減既不成恩又不成屈且道設齋圖箇甚麼玄要為羹賓主飯山田家圃堪充辦今朝忌日滿盤陳一點孝心無破綻
